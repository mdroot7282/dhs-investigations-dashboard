<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DII DHS Statistics Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Illinois State Police</h1>

<h2>Division of Internal Investigation</h2>

<h3>DHS Investigative Statistics Dashboard</h3>

</header>

<div id="kpiRow">

<div class="kpiCard">

<div class="kpiTitle">Facilities</div>

<div class="kpiValue" id="facilityCount">0</div>

</div>

<div class="kpiCard">

<div class="kpiTitle">Allegations</div>

<div class="kpiValue" id="totalAllegations">0</div>

</div>

<div class="kpiCard">

<div class="kpiTitle">Opened</div>

<div class="kpiValue" id="totalOpened">0</div>

</div>

<div class="kpiCard">

<div class="kpiTitle">Active</div>

<div class="kpiValue" id="totalActive">0</div>

</div>

<div class="kpiCard">

<div class="kpiTitle">Charged</div>

<div class="kpiValue" id="totalCharged">0</div>

</div>

</div>

<div id="mainGrid">

<div id="mapCard">

<div id="map"></div>

</div>

<div id="detailsCard">

<h2>Facility Statistics</h2>

<div id="details">

Click a facility marker.

</div>

</div>

</div>

<footer>

<div>

Last Refresh

<span id="lastRefresh">

--

</span>

</div>

<div>

DHS Facilities

<span id="facilityFooter">

15

</span>

</div>

</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="config.js"></script>

<script src="data.js"></script>

<script src="app.js"></script>

</body>

</html>
